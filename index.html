<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frozen Food Sales Calculator</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #046129;
    margin: 0;
    padding: 16px;
    color: #0a0909;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
    background: orangered;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  p.subtitle { font-size: 14px; color: #090808; margin: 0 0 20px; }
  #upload-area {
    border: 2px dashed #ccc;
    border-radius: 10px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  #upload-area:hover, #upload-area.dragover { border-color: #888; background: #fafafa; }
  #upload-area p { margin: 8px 0 0; font-size: 15px; }
  #upload-area p.small { font-size: 13px; color: #040404; }
  #file-input { display: none; }
  #result-area { display: none; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .card { background: #f5f5f3; border-radius: 8px; padding: 14px; }
  .card .label { font-size: 13px; color: #070707; margin: 0 0 4px; }
  .card .value { font-size: 22px; font-weight: 600; margin: 0; }
  .actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  button { font-size: 14px; padding: 8px 14px; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
  button:hover { background: #f5f5f3; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
  th { color: #020101; font-weight: 600; font-size: 13px; }
  td.value, th.value { text-align: right; }
  tr.zero td { color: #bbb; }
  #error-area { display: none; color: #c0392b; font-size: 14px; margin-top: 10px; background: #fdecea; padding: 10px 14px; border-radius: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>Frozen Food Sales Calculator</h1>
  <p class="subtitle">Upload your Mira POS sales export (CSV) to get total sales per item, converted to kg.</p>

  <div id="upload-area">
    <div style="font-size: 28px;">⬆️</div>
    <p>Tap to choose your Mira POS CSV file</p>
    <p class="small">or drag and drop it here</p>
    <input type="file" id="file-input" accept=".csv" />
  </div>

  <div id="result-area">
    <div class="cards" id="summary-cards"></div>
    <div class="actions">
      <button id="copy-btn">📋 Copy table</button>
      <button id="export-btn">⬇️ Download as CSV</button>
      <button id="reset-btn">🔄 Upload another file</button>
    </div>
    <div style="overflow-x: auto;">
      <table id="results-table"></table>
    </div>
  </div>

  <div id="error-area"></div>
</div>

<script>
// ─── FIXED ITEM ORDER ────────────────────────────────────────────────────────
const FIXED_ITEMS = [
  'Kote','Titus','Shawa',
  'Panla Kilo',
  'Panla Ksf Ct','Panla Africa Ct','Panla Pp Ct','Panla Ward Ct',
  'Panla 30Kg Ct','Panla Premier Ct','Panla Gb Ct','Panla Sesede Ct',
  'Ojuyobo','Hake','Rock','Owere','Saithe','Mullet','Haddock',
  'Tilapia','Croaker','New Item',
  'Turkey','Blanket','Laps','Orobo','Wings','Chest',
  'Full Chicken','N. Chicken','Fingers','Turkey Gizzard','Chicken Gizzard',
  'Mina Sausage','Seara Sausage',
  'Fillets','Drumstick','Fryer','Heart','Liver',
];

// Panla ct variants — measured in cartons (ct=1, 1/2ct=0.5, 1/4ct=0.25, 1/8ct=0.125)
const PANLA_CT_ITEMS = [
  'panla ksf ct','panla africa ct','panla pp ct','panla ward ct',
  'panla 30kg ct','panla premier ct','panla gb ct','panla sesede ct',
];

// Items counted in pieces (not kg or cartons)
const PIECE_ITEMS = ['mina sausage','seara sausage'];

// Items where 1 full carton = 10kg (everything else = 20kg)
const TEN_KG_ITEMS = [
  'rock','hake','owere','tilapia','turkey','blanket','laps','orobo',
  'wings','chest','full chicken','n. chicken','n chicken','fingers',
  'turkey gizzard','chicken gizzard','saithe','haddock','ojuyobo',
  'fillets','heart','liver','drumstick','fryer'
];

const FIFTEEN_KG_ITEMS = ['yellow tail'];

function getCartonKg(canonical) {
  const lower = canonical.toLowerCase();
  for (const key of TEN_KG_ITEMS) {
    if (lower.includes(key)) return 10;
  }
  return 20;
}

function getCanonicalName(rawBase) {
  const s = rawBase.trim().toLowerCase();

  if (s.startsWith('panla')) {
    if (s.includes('sesede'))  return 'Panla Sesede Ct';
    if (s.includes('africa'))  return 'Panla Africa Ct';
    if (s.includes('premier')) return 'Panla Premier Ct';
    if (s.includes('ward'))    return 'Panla Ward Ct';
    if (s.includes('30kg') || s.includes('30 kg')) return 'Panla 30Kg Ct';
    if (s.includes('gb'))      return 'Panla Gb Ct';
    if (s.includes('pp'))      return 'Panla Pp Ct';
    if (s.includes('ksf'))     return 'Panla Ksf Ct';
    return 'Panla Kilo';
  }

  if (s.includes('sausage')) {
    if (s.includes('mina'))  return 'Mina Sausage';
    if (s.includes('seara') || s.includes('sara')) return 'Seara Sausage';
    return 'Mina Sausage';
  }

  if (s.includes('turkey blanket')) return 'Blanket';
  if (s.includes('turkey gizzard')) return 'Turkey Gizzard';
  if (s.startsWith('turkey'))       return 'Turkey';

  if (s.includes('chicken gizzard'))  return 'Chicken Gizzard';
  if (s.startsWith('full chicken'))   return 'Full Chicken';
  if (s.startsWith('n.') || s.startsWith('n chicken') || s.startsWith('n. chicken')) return 'N. Chicken';

  for (const [stem, name] of [
    ['kote','Kote'],['titus','Titus'],['shawa','Shawa'],['hake','Hake'],
    ['rock','Rock'],['owere','Owere'],['saithe','Saithe'],['mullet','Mullet'],
    ['haddock','Haddock'],['tilapia','Tilapia'],['croaker','Croaker'],
    ['ojuyobo','Ojuyobo'],['new item','New Item'],['drumstick','Drumstick'],
    ['fryer','Fryer'],['wings','Wings'],['laps','Laps'],['orobo','Orobo'],
    ['chest','Chest'],['blanket','Blanket'],['fingers','Fingers'],
    ['fillets','Fillets'],['heart','Heart'],['liver','Liver'],
    ['yellow tail','Titus'],['yellow','Titus'],
  ]) {
    if (s.startsWith(stem)) return name;
  }

  let name = rawBase.trim();
  name = name.replace(/\s+(ct|kilo|kg|ksf|carton)$/i, '').trim();
  name = name.replace(/\s+\d+kg$/i, '').trim();
  name = name.replace(/\b\w/g, c => c.toUpperCase());
  return name;
}

function parseItem(fullItemName, quantity) {
  const dashIndex = fullItemName.indexOf(' - ');
  const rawBase = dashIndex >= 0 ? fullItemName.substring(0, dashIndex) : fullItemName;
  const unitPart = dashIndex >= 0 ? fullItemName.substring(dashIndex + 3).trim().toLowerCase() : '';

  const canonical = getCanonicalName(rawBase);
  const lowerCanonical = canonical.toLowerCase();

  // Pieces (sausage brands)
  if (PIECE_ITEMS.includes(lowerCanonical)) {
    return { canonical, kg: null, cartons: null, pieces: quantity };
  }

  // Panla ct variants — measured in cartons, not kg
  if (PANLA_CT_ITEMS.includes(lowerCanonical)) {
    let ct = 0;
    if (unitPart.includes('ct') || unitPart.includes('carton')) {
      if (unitPart.includes('1/8'))      ct = 0.125;
      else if (unitPart.includes('1/4')) ct = 0.25;
      else if (unitPart.includes('1/2')) ct = 0.5;
      else                               ct = 1;
    } else {
      ct = 1; // fallback
    }
    return { canonical, kg: null, cartons: ct * quantity, pieces: null };
  }

  // Everything else — convert to kg
  const cartonKg = getCartonKg(canonical);
  let kg = 0;

  if (unitPart.includes('ct') || unitPart.includes('carton')) {
    if (unitPart.includes('1/8'))      kg = cartonKg / 8;
    else if (unitPart.includes('1/4')) kg = cartonKg / 4;
    else if (unitPart.includes('1/2')) kg = cartonKg / 2;
    else                               kg = cartonKg;
  } else if (unitPart.includes('kilo') || unitPart.includes('kg')) {
    if (unitPart.includes('1/2'))      kg = 0.5;
    else if (unitPart.includes('1/4')) kg = 0.25;
    else if (unitPart.includes('1/8')) kg = 0.125;
    else                               kg = 1;
  } else if (unitPart.includes('point')) {
    const m = unitPart.match(/(\d+)\s*point/);
    kg = (m ? parseInt(m[1]) : 1) * 0.05;
  } else {
    kg = 1;
  }

  return { canonical, kg: kg * quantity, cartons: null, pieces: null };
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  // Initialise all fixed items at zero
  const items = {};
  FIXED_ITEMS.forEach(name => { items[name] = { kg: 0, cartons: 0, pieces: 0 }; });

  let inItemsSection = false;
  let headerSkipped = false;

  for (const line of lines) {
    if (line.toLowerCase().startsWith('name,quantity')) {
      inItemsSection = true; headerSkipped = true; continue;
    }
    if (line.toLowerCase().startsWith('payment method')) {
      inItemsSection = false; continue;
    }
    if (!inItemsSection || !headerSkipped) continue;

    const lastComma = line.lastIndexOf(',');
    if (lastComma === -1) continue;
    const name = line.substring(0, lastComma).trim();
    const qty = parseFloat(line.substring(lastComma + 1).trim());
    if (!name || isNaN(qty)) continue;

    const parsed = parseItem(name, qty);
    const key = parsed.canonical;

    if (!items[key]) items[key] = { kg: 0, cartons: 0, pieces: 0 };
    if (parsed.kg !== null)      items[key].kg      += parsed.kg;
    if (parsed.cartons !== null) items[key].cartons += parsed.cartons;
    if (parsed.pieces !== null)  items[key].pieces  += parsed.pieces;
  }

  return items;
}

function getDisplayValue(n, d) {
  const lower = n.toLowerCase();
  if (PIECE_ITEMS.includes(lower))     return `${d.pieces} pcs`;
  if (PANLA_CT_ITEMS.includes(lower))  return `${d.cartons % 1 === 0 ? d.cartons : d.cartons.toFixed(3).replace(/\.?0+$/, '')} ct`;
  return `${d.kg.toFixed(2)} kg`;
}

function isZeroRow(n, d) {
  const lower = n.toLowerCase();
  if (PIECE_ITEMS.includes(lower))    return d.pieces === 0;
  if (PANLA_CT_ITEMS.includes(lower)) return d.cartons === 0;
  return d.kg === 0;
}

function render(items) {
  const errorArea = document.getElementById('error-area');
  const resultArea = document.getElementById('result-area');
  const summaryCards = document.getElementById('summary-cards');
  const table = document.getElementById('results-table');

  errorArea.style.display = 'none';

  let totalKg = 0, totalPieces = 0, itemsSold = 0;
  FIXED_ITEMS.forEach(n => {
    const d = items[n] || { kg: 0, cartons: 0, pieces: 0 };
    totalKg += d.kg;
    totalPieces += d.pieces;
    if (!isZeroRow(n, d)) itemsSold++;
  });

  summaryCards.innerHTML = `
    <div class="card"><p class="label">Total weight sold</p><p class="value">${totalKg.toFixed(2)} kg</p></div>
    <div class="card"><p class="label">Sausage (pieces)</p><p class="value">${totalPieces}</p></div>
    <div class="card"><p class="label">Items sold</p><p class="value">${itemsSold}</p></div>
  `;

  let rows = '<tr><th>Item</th><th class="value">Total</th></tr>';
  FIXED_ITEMS.forEach(n => {
    const d = items[n] || { kg: 0, cartons: 0, pieces: 0 };
    const zero = isZeroRow(n, d);
    rows += `<tr class="${zero ? 'zero' : ''}"><td>${n}</td><td class="value">${getDisplayValue(n, d)}</td></tr>`;
  });

  table.innerHTML = rows;
  resultArea.style.display = 'block';
  document.getElementById('upload-area').style.display = 'none';
  window._lastItems = items;
}

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try { render(parseCSV(e.target.result)); }
    catch (err) {
      const errorArea = document.getElementById('error-area');
      errorArea.textContent = 'Error reading file: ' + err.message;
      errorArea.style.display = 'block';
    }
  };
  reader.readAsText(file);
}

const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});

document.getElementById('reset-btn').addEventListener('click', () => {
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
  fileInput.value = '';
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const items = window._lastItems || {};
  let text = 'Item\tTotal\n';
  FIXED_ITEMS.forEach(n => {
    const d = items[n] || { kg: 0, cartons: 0, pieces: 0 };
    text += `${n}\t${getDisplayValue(n, d)}\n`;
  });
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copy-btn');
  const original = btn.innerHTML;
  btn.innerHTML = '✅ Copied!';
  setTimeout(() => { btn.innerHTML = original; }, 1500);
});

document.getElementById('export-btn').addEventListener('click', () => {
  const items = window._lastItems || {};
  let csv = 'Item,Total\n';
  FIXED_ITEMS.forEach(n => {
    const d = items[n] || { kg: 0, cartons: 0, pieces: 0 };
    csv += `"${n}",${getDisplayValue(n, d)}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'frozen_food_sales.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
